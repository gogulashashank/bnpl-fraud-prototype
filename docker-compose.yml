version: '3.8'

services:
  api:
    build: .
    container_name: fraud_api
    ports:
      - "8000:8000"
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app

  ui:
    build: .
    container_name: fraud_ui
    ports:
      - "8501:8501"
    command: streamlit run ui/app.py --server.address 0.0.0.0
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
    depends_on:
      - api
